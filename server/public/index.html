<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="scripts/jquery-3.6.0.min.js"></script>
    <script src="client.js"></script>
    <link href="style.css" rel="stylesheet">
    <title>Document</title>
</head>
<body class="background-color">
    <h2 class="important-font-color-and-size">To-Do List</h2>

    <input id="createATask" type="text" placeholder="Create a task...">
    <button id="addTaskButton">Add Task</button>

    <section>
    <h2 class="important-font-color-and-size">All Tasks</h2>
    <table class="table-spacing">
        <thead>
            <tr>
                <th class="list-header-font-and-color">Tasks</th>
                <th class="list-header-font-and-color">Complete your task!</th>
                <th class="list-header-font-and-color">Delete this task...</th>
            </tr>
            <tbody id="viewList" class="list-header-font-and-color">
            </tbody>
        </thead>
    </table>
    </section>
</body>
</html>
